name: 📋 YouTube Video List Generator

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '🔄 Source type'
        required: true
        type: choice
        options:
          - playlist
          - channel
          - search
        default: 'playlist'
      url:
        description: '🔗 URL or channel name (@handle) or search query'
        required: true
        type: string
      max_videos:
        description: '🔢 Max videos to list'
        required: false
        type: number
        default: 20
      start_index:
        description: '🔹 Start from video number (1-based)'
        required: false
        type: number
        default: 1
      end_index:
        description: '🔹 End at video number (0 = use max_videos)'
        required: false
        type: number
        default: 0

env:
  PYTHONUNBUFFERED: '1'
  DEBIAN_FRONTEND: 'noninteractive'

jobs:
  generate-index:
    name: 📋 Generate Video Index
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}

      - name: ⚡ Setup
        run: |
          python3 -c "import requests" 2>/dev/null || pip3 install -q requests
          command -v yt-dlp &>/dev/null || pip3 install -q yt-dlp

      - name: 🔗 Prepare
        id: prep
        run: |
          M="${{ github.event.inputs.mode }}"
          U="${{ github.event.inputs.url }}"
          if [ "$M" == "channel" ] && [[ "$U" != http* ]]; then
            U="https://www.youtube.com/$([[ "$U" == @* ]] && echo "$U" || echo "@$U")"
          fi
          echo "URL=$U" >> $GITHUB_OUTPUT
          echo "MODE=$M" >> $GITHUB_OUTPUT

      - name: 📝 Create Markdown Index
        env:
          MODE: ${{ steps.prep.outputs.MODE }}
          URL: ${{ steps.prep.outputs.URL }}
          MAX: ${{ github.event.inputs.max_videos }}
          START: ${{ github.event.inputs.start_index }}
          END: ${{ github.event.inputs.end_index }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, subprocess, sys, hashlib
          from pathlib import Path
          from datetime import datetime

          M = os.environ['MODE']
          U = os.environ['URL']
          MX = int(os.environ.get('MAX', 20))
          START = int(os.environ.get('START', 1))
          END = int(os.environ.get('END', 0))

          def safe_name(text, maxlen=40):
              safe = re.sub(r'[^\w]', '_', text)[:maxlen]
              safe = re.sub(r'_+', '_', safe).strip('_')
              if not safe:
                  safe = hashlib.md5(text.encode()).hexdigest()[:8]
              return safe

          def fetch_videos(url, mode, start, end, max_videos):
              cmd = ['yt-dlp', '--flat-playlist', '--dump-json', '--no-warnings', '--no-check-certificate']

              if mode == 'search':
                  url = f'ytsearch{max_videos}:{url}'

              if mode in ('playlist', 'channel') and start > 1:
                  cmd.extend(['--playlist-start', str(start)])

              if mode in ('playlist', 'channel') and end > 0:
                  cmd.extend(['--playlist-end', str(end)])
              elif mode in ('playlist', 'channel') and max_videos > 0 and end == 0:
                  cmd.extend(['--playlist-end', str(max_videos)])

              cmd.append(url)
              r = subprocess.run(cmd, capture_output=True, text=True, timeout=60)
              videos = []
              for line in r.stdout.strip().split('\n'):
                  if line:
                      try:
                          d = json.loads(line)
                          vid = d.get('id', '')
                          if not vid: continue
                          title = d.get('title', 'Untitled')[:80]
                          channel = d.get('channel') or d.get('uploader') or 'Unknown'
                          duration = d.get('duration', 0) or 0
                          thumbnail = f'https://i.ytimg.com/vi/{vid}/maxresdefault.jpg'
                          view_count = d.get('view_count', 0) or 0
                          videos.append({
                              'id': vid,
                              'title': title,
                              'channel': channel,
                              'duration': int(duration),
                              'thumbnail': thumbnail,
                              'views': int(view_count),
                              'url': f'https://youtube.com/watch?v={vid}'
                          })
                      except:
                          continue
              if mode in ('playlist', 'channel') and end == 0 and max_videos > 0 and len(videos) > max_videos:
                  videos = videos[:max_videos]
              return videos

          videos = fetch_videos(U, M, START, END, MX)
          if not videos:
              print('❌ No videos found.')
              sys.exit(1)

          total = len(videos)
          ts = datetime.now().strftime('%Y-%m-%d_%H-%M-%S')
          base_name = safe_name(U, 30) if M == 'search' else 'playlist' if M == 'playlist' else 'channel'
          out_dir = Path('youtube_indexes')
          out_dir.mkdir(exist_ok=True)
          index_path = out_dir / f'{base_name}_{ts}.md'

          lines = []
          lines.append(f'# 📺 YouTube {M.capitalize()} Index\n')
          lines.append(f'**Date:** {datetime.now():%Y-%m-%d %H:%M}  \n')
          lines.append(f'**Videos:** {total}\n')
          lines.append('\n---\n\n')
          lines.append('| # | Thumbnail | Title | Duration | Views | Link |\n')
          lines.append('|---|-----------|-------|----------|-------|------|\n')

          for i, v in enumerate(videos, 1):
              dur_str = f'{v["duration"]//60}:{v["duration"]%60:02d}' if v['duration'] else '?'
              thumb_md = f'<img src="{v["thumbnail"]}" width="80">'
              lines.append(f'| {i} | {thumb_md} | {v["title"]} | {dur_str} | {v["views"]} | [Watch]({v["url"]}) |\n')

          lines.append('\n---\n\n## 📝 Detailed List\n\n')
          for i, v in enumerate(videos, 1):
              dur_str = f'{v["duration"]//60}:{v["duration"]%60:02d}' if v['duration'] else 'Unknown'
              lines.append(f'### {i}. {v["title"]}\n\n')
              lines.append(f'![Thumbnail]({v["thumbnail"]})\n\n')
              lines.append(f'- **Channel:** {v["channel"]}\n')
              lines.append(f'- **Duration:** {dur_str}\n')
              lines.append(f'- **Views:** {v["views"]}\n')
              lines.append(f'- **URL:** {v["url"]}\n\n')
              lines.append(f'---\n\n')

          with open(index_path, 'w', encoding='utf-8') as f:
              f.write('\n'.join(lines))

          print(f'✅ Index saved: {index_path}')
          print(f'📋 {total} videos listed.')
          PYEOF

      - name: 📤 Push Index File
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "📋 Index $(date +%m%d-%H%M) [skip ci]"
          git push
