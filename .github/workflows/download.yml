name: SoundCloud Downloader (Tor)

on:
  workflow_dispatch:
    inputs:
      soundcloud_url:
        description: 'SoundCloud track or playlist URL'
        required: true
        type: string
      filename:
        description: 'Output filename (optional)'
        required: false
        type: string
        default: ''

jobs:
  download-via-tor:
    name: Download Audio via Tor
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tor and yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y tor
          pip install yt-dlp

      - name: Start Tor service
        run: sudo systemctl start tor

      - name: Download Audio through Tor
        id: download
        run: |
          python3 << 'PYEOF'
          import os, sys, subprocess

          SOUNDCLOUD_URL = os.environ['SOUNDCLOUD_URL'].strip()
          CUSTOM_FILENAME = os.environ.get('FILENAME', '').strip()

          os.makedirs("downloads", exist_ok=True)

          cmd = [
              "yt-dlp",
              "-f", "bestaudio",
              "--output", "downloads/%(title)s.%(ext)s",
              "--proxy", "socks5://127.0.0.1:9050",
              "--user-agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",
              SOUNDCLOUD_URL
          ]

          print(f"Downloading from: {SOUNDCLOUD_URL}")
          result = subprocess.run(cmd)
          if result.returncode != 0:
              print(f"ERROR: yt-dlp exited with code {result.returncode}")
              sys.exit(1)

          all_files = [f for f in os.listdir("downloads") if not f.startswith('.')]
          if not all_files:
              print("No file downloaded.")
              sys.exit(1)
          newest_file = max(all_files, key=lambda f: os.path.getmtime(os.path.join("downloads", f)))
          original_path = os.path.join("downloads", newest_file)
          file_size = os.path.getsize(original_path) / (1024 * 1024)

          final_name = newest_file
          if CUSTOM_FILENAME:
              ext = os.path.splitext(newest_file)[1]
              new_name = CUSTOM_FILENAME + ext
              new_path = os.path.join("downloads", new_name)
              os.rename(original_path, new_path)
              final_name = new_name

          print(f"SUCCESS: {final_name} ({file_size:.2f} MB)")

          with open('/tmp/audio_meta.txt', 'w') as f:
              f.write(f"{final_name}\n{file_size:.2f}\n")
          PYEOF
        env:
          SOUNDCLOUD_URL: ${{ github.event.inputs.soundcloud_url }}
          FILENAME: ${{ github.event.inputs.filename }}

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add downloads/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          FILENAME=$(sed -n '1p' /tmp/audio_meta.txt)
          SIZE_MB=$(sed -n '2p' /tmp/audio_meta.txt)
          git commit -m "Download $FILENAME ($SIZE_MB MB)"
          git pull --rebase origin main
          git push origin main
