name: SoundCloud Downloader (Debug)

on:
  workflow_dispatch:
    inputs:
      soundcloud_url:
        description: 'SoundCloud track or playlist URL'
        required: true
        type: string
      filename:
        description: 'Output filename (optional)'
        required: false
        type: string
        default: ''

jobs:
  download-audio:
    name: Download SoundCloud Audio (debug)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Download with verbose output
        run: |
          mkdir -p downloads
          yt-dlp \
            -v \
            -f bestaudio \
            --output "downloads/%(title)s.%(ext)s" \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "${{ github.event.inputs.soundcloud_url }}" 2>&1 | tee download.log
          echo "=== ls downloads ==="
          ls -la downloads/
        continue-on-error: true

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add downloads/ download.log || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Debug download attempt"
          git pull --rebase origin main
          git push origin main
