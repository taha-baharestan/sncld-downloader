name: SoundCloud Downloader (via sclib)

on:
  workflow_dispatch:
    inputs:
      soundcloud_url:
        description: 'SoundCloud track URL'
        required: true
        type: string
      filename:
        description: 'Output filename (optional, without extension)'
        required: false
        type: string
        default: ''

jobs:
  download:
    name: Download Track
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install soundcloud-lib
        run: pip install soundcloud-lib

      - name: Download Audio
        id: download_step
        env:
          INPUT_URL: ${{ github.event.inputs.soundcloud_url }}
          CUSTOM_NAME: ${{ github.event.inputs.filename }}
        run: |
          python3 << 'PYEOF'
          import os, sys
          from sclib import SoundcloudAPI, Track

          url = os.environ['INPUT_URL'].strip()
          custom_name = os.environ.get('CUSTOM_NAME', '').strip()

          api = SoundcloudAPI()

          print(f"Resolving: {url}")
          try:
              track = api.resolve(url)
              if not isinstance(track, Track):
                  print("Error: The URL does not point to a track.")
                  sys.exit(1)
          except Exception as e:
              print(f"Failed to resolve track: {e}")
              sys.exit(1)

          artist = track.artist or "Unknown Artist"
          title = track.title or "Unknown Title"

          if custom_name:
              filename = f"{custom_name}.mp3"
          else:
              safe = lambda s: "".join(c for c in s if c.isalnum() or c in (' ','-','_')).rstrip()
              filename = f"{safe(artist)} - {safe(title)}.mp3"

          os.makedirs("downloads", exist_ok=True)
          filepath = os.path.join("downloads", filename)

          print(f"Downloading: {artist} - {title}")
          try:
              with open(filepath, 'wb+') as f:
                  track.write_mp3_to(f)
          except Exception as e:
              print(f"Error writing mp3: {e}")
              sys.exit(1)

          size_mb = os.path.getsize(filepath) / (1024 * 1024)
          print(f"SUCCESS: {filename} ({size_mb:.2f} MB)")

          with open('/tmp/meta.txt', 'w') as f:
              f.write(f"{filename}\n{size_mb:.2f}\n")
          PYEOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add downloads/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          FILENAME=$(sed -n '1p' /tmp/meta.txt)
          SIZE=$(sed -n '2p' /tmp/meta.txt)
          git commit -m "Download $FILENAME ($SIZE MB)"
          git pull --rebase origin main
          git push origin main
