name: 🧹 Clean Selected Downloads & Indexes

on:
  workflow_dispatch:
    inputs:
      target:
        description: '🎯 Which service files to delete?'
        required: true
        type: choice
        options:
          - youtube
          - soundcloud
          - all
        default: 'youtube'
      confirm:
        description: 'Type DELETE to confirm'
        required: true
        type: string

jobs:
  cleanup:
    name: 🧹 Clean Up
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DELETE'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🧹 Remove selected folders and logs
        run: |
          TARGET="${{ github.event.inputs.target }}"

          if [[ "$TARGET" == "youtube" || "$TARGET" == "all" ]]; then
            echo "Removing YouTube folders..."
            rm -rf youtube_downloads/
            rm -rf youtube_searches/
            rm -rf youtube_playlists/
            rm -rf youtube_indexes/
          fi

          if [[ "$TARGET" == "soundcloud" || "$TARGET" == "all" ]]; then
            echo "Removing SoundCloud folders..."
            rm -rf soundcloud_downloads/
            rm -rf soundcloud_searches/
          fi

          echo "Removing all logs & temp files..."
          find . -maxdepth 1 -name "*.log" -type f -delete
          find . -maxdepth 1 -name "*.part" -type f -delete
          find . -maxdepth 1 -name "*.ytdl" -type f -delete
          find . -maxdepth 1 -name "*.tmp" -type f -delete
          find . -maxdepth 1 -name "*.json" -type f -delete

          echo "Cleanup finished."

      - name: 📤 Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to push."
            exit 0
          fi
          git commit -m "🧹 Clean ${{ github.event.inputs.target }} files [skip ci]"
          git push
