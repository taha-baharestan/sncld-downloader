name: 🧹 Clean All Downloads & Logs

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DELETE to confirm cleanup'
        required: true
        type: string

jobs:
  cleanup:
    name: 🧹 Clean Repository
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DELETE'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🧹 Remove all generated content
        run: |
          echo "Removing download directories..."
          rm -rf downloads/
          rm -rf searches/
          rm -rf playlists/

          echo "Removing temporary and log files..."
          find . -maxdepth 1 -name "*.log" -type f -delete
          find . -maxdepth 1 -name "*.part" -type f -delete
          find . -maxdepth 1 -name "*.ytdl" -type f -delete
          find . -maxdepth 1 -name "*.tmp" -type f -delete
          find . -maxdepth 1 -name "*.json" -type f -delete

          echo "Cleanup complete."

      - name: 📤 Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit - repo is clean."
            exit 0
          fi
          git commit -m "🧹 Clean downloads and logs [skip ci]"
          git push
